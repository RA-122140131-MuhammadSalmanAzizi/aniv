<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="Website Bucin Anti Mainstream — Salman dan Nabila | Mini Games, Interaksi Lucu, dan Kejutan Romantis">
    <title>Salman dan Nabila — Bucin Anti Mainstream</title>
    <link rel="icon" type="image/png" href="/assets/mansAI-ceria.png">
    <link rel="apple-touch-icon" href="/assets/mansAI-ceria.png">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#0c1929">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;600;700&family=Outfit:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,600;0,700;1,400&display=swap" rel="stylesheet">
</head>
<body>
    <style>
      #loading-screen {
        position: fixed; inset: 0; background: #0c1929; z-index: 100000;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        color: #89cff0; font-family: 'Dancing Script', cursive; text-align: center;
        transition: opacity 0.5s ease;
      }
      .heart-loader { font-size: 4rem; animation: heartbeat 1.5s infinite; margin-bottom: 20px; }
      @keyframes heartbeat { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.2); } }
    </style>
    <div id="loading-screen">
      <div class="heart-loader">💖</div>
      <h2 style="font-size: 2.5rem; margin:0;">Sabar ya Nabila cantik...</h2>
      <p style="font-size: 1.2rem; opacity: 0.8; font-family: 'Outfit', sans-serif; margin-top:10px;">Sedang memuat kenangan kita...</p>
    </div>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
</body>
</html>
